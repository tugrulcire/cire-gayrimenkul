<!DOCTYPE html> <html 
lang="tr"> <head>

    charset="UTF-8">

    <script 
    src="https://cdn.tailwindcss.com"></script>
</head> <body 
class="bg-gray-100 
p-4">
    <h1 class="text-xl

    text-center 
    mb-4">AHMET CİRE 
    G.Y.D MAĞAZA</h1> 
    <div id="ilanlar" 
    class="space-y-4">
        </div> 
    <script>
        const ilanlar 
        = [
            { baslik: 
            "HACIAKİF'DE 
            SATILIK 
            2+1", 
            fiyat: 
            "2.590.000 
            TL" }, { 
            baslik: 
            "MÜFTÜ 
            MAHALLESİ 
            SATILIK

            fiyat: 
            "3.549.000 
            TL" }, { 
            baslik: 
            "KİRALIK 
            GÖL 
            MANZARALI 
            2+1", 
            fiyat: 
            "18.000 
            TL" }
        ]; const 
        container = 
        document.getElementById('ilanlar'); 
        ilanlar.forEach(i 
        => {
            container.innerHTML 
            += `<div 
            class="bg-white 
            p-4 
            rounded 
            shadow">
                <h2 
                class="font-bold">${i.baslik}</h2> 
                <p 
                class="text-green-600 
                font-bold">${i.fiyat}</p>
            </div>`;
        });
    </script> </body>
