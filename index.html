<!DOCTYPE html> <html 
lang="tr"> <head>
    <meta 
    charset="UTF-8"> 
    <meta 
    name="viewport" 
    content="width=device-width, 
    initial-scale=1.0"> 
    <script 
    src="https://cdn.tailwindcss.com"></script> 
    <title>AHMET CİRE 
    GAYRİMENKUL</title>
</head> <body 
class="bg-slate-50 
p-4">
    <!-- Ana Sayfa --> 
    <div id="anaSayfa" 
    class="max-w-xl 
    mx-auto">
        <h1 
        class="text-2xl 
        font-black 
        text-center 
        text-slate-950 
        mb-8 uppercase 
        tracking-widest">AHMET 
        CİRE 
        GAYRİMENKUL</h1>
        
        <!-- İLAN 
        LİSTESİ --> 
        <div 
        id="ilanListesi" 
        class="space-y-4">
            <!-- 
            İlanları 
            buraya 
            ekleyeceksin 
            --> <div 
            class="bg-white 
            p-6 
            rounded-3xl 
            shadow-sm 
            border" 
            onclick="goster('fabrikaDetay')">
                <h2 
                class="font-bold 
                text-slate-900 
                text-lg">AHMET 
                CİRE - 
                G.Y.D. 
                FABRİKA</h2> 
                <p 
                class="text-amber-600 
                font-bold 
                mt-1">31.500.000 
                TL</p>
            </div> 
            <div 
            class="bg-white 
            p-6 
            rounded-3xl 
            shadow-sm 
            border" 
            onclick="goster('daireDetay')">
                <h2 
                class="font-bold 
                text-slate-900 
                text-lg">Göl 
                Manzaralı 
                2+1</h2> 
                <p 
                class="text-amber-600 
                font-bold 
                mt-1">18.000 
                TL</p>
            </div> 
        </div>
    </div> <!-- 
    Detaylar (GİZLİ 
    TUTULUR) --> <div 
    id="detayAlani">
        <div 
        id="fabrikaDetay" 
        class="hidden 
        max-w-xl 
        mx-auto 
        bg-white p-8 
        rounded-3xl 
        shadow-sm 
        border">
            <button 
            onclick="goster('anaSayfa')" 
            class="text-slate-500 
            font-bold">← 
            Geri</button> 
            <h1 
            class="text-2xl 
            font-bold 
            mt-4">AHMET 
            CİRE - 
            G.Y.D. 
            FABRİKA</h1> 
            <!-- 
            ...Fabrika 
            detay 
            içeriği 
            buraya... 
            -->
        </div> <div 
        id="daireDetay" 
        class="hidden 
        max-w-xl 
        mx-auto 
        bg-white p-8 
        rounded-3xl 
        shadow-sm 
        border">
            <button 
            onclick="goster('anaSayfa')" 
            class="text-slate-500 
            font-bold">← 
            Geri</button> 
            <h1 
            class="text-2xl 
            font-bold 
            mt-4">Göl 
            Manzaralı 
            2+1</h1> 
            <!-- 
            ...Daire 
            detay 
            içeriği 
            buraya... 
            -->
        </div> </div> 
    <script>
        function 
        goster(id) {
            // Ana 
            // sayfayı 
            // ve tüm 
            // detayları 
            // gizle
            document.getElementById('anaSayfa').classList.add('hidden'); 
            document.getElementById('fabrikaDetay').classList.add('hidden'); 
            document.getElementById('daireDetay').classList.add('hidden');
            
            // Seçileni 
            // göster
            if(id === 
            'anaSayfa') 
            {
                document.getElementById('anaSayfa').classList.remove('hidden');
            } else {
                document.getElementById(id).classList.remove('hidden');
            }
        }
    </script> </body> 
</html>
