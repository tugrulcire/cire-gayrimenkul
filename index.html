<!DOCTYPE html> <html 
lang="tr"> <head>
    <meta 
    charset="UTF-8"> 
    <meta 
    name="viewport" 
    content="width=device-width, 
    initial-scale=1.0"> 
    <title>AHMET CİRE 
    G.Y.D 
    MAĞAZA</title> 
    <script 
    src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
</head> <body 
class="bg-gray-100 
pb-20">
    <header 
    class="bg-[#1e3a8a] 
    text-white py-4 
    text-center 
    font-bold 
    shadow-md">
        AHMET CİRE 
        G.Y.D MAĞAZA
    </header> <main 
    class="max-w-md 
    mx-auto p-4 
    space-y-3" 
    id="liste"></main> 
    <script>
        const ilanlar 
        = [
            { baslik: 
            "HACIAKİF'DE 
            SATILIK 
            2+1", 
            fiyat: 
            "2.590.000 
            TL" }, { 
            baslik: 
            "MÜFTÜ 
            MAHALLESİ 
            SATILIK 
            ARAKAT", 
            fiyat: 
            "3.549.000 
            TL" }, { 
            baslik: 
            "KİRALIK 
            GÖL 
            MANZARALI 
            2+1", 
            fiyat: 
            "18.000 
            TL" }
        ]; const liste 
        = 
        document.getElementById('liste'); 
        ilanlar.forEach(i 
        => {
            liste.innerHTML 
            += `<div 
            class="bg-white 
            p-4 
            rounded-lg 
            shadow-sm 
            border 
            border-gray-200">
                <h2 
                class="font-bold 
                text-blue-700 
                text-sm">${i.baslik}</h2> 
                <p 
                class="text-green-700 
                font-bold 
                text-sm 
                mt-1">Fiyat: 
                ${i.fiyat}</p>
            </div>`;
        });
    </script> </body> 
</html>
